<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px}
input,select,button{padding:8px;margin:4px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ddd;padding:8px}
th{background:#f2f2f2}
.total{font-size:1.2rem;font-weight:bold;margin-top:10px}
</style>
</head>
<body>
<h1>Finanzas Personales</h1>

<form id="txForm">
<input type="date" id="date" required>
<select id="type">
<option value="Ingreso">Ingreso</option>
<option value="Gasto">Gasto</option>
</select>
<input type="text" id="category" placeholder="Categoría" required>
<input type="text" id="concept" placeholder="Concepto" required>
<input type="number" step="0.01" id="amount" placeholder="Monto" required>
<button type="submit">Guardar</button>
</form>

<div class="total" id="balance">Balance: 0</div>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Categoría</th>
<th>Concepto</th>
<th>Monto</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const SUPABASE_URL='https://hkymlrxewanweiezitzp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhreW1scnhld2Fud2VpZXppdHpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDQzOTQsImV4cCI6MjA5NjUyMDM5NH0.lqHbg-yO_hO4PnhDMsl2BXevb7-aY-SaKYui3qJLkqM';

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function loadData(){
 const {data,error}=await client
   .from('transactions')
   .select('*')
   .order('date',{ascending:false});

 if(error){console.error(error);return;}

 const tbody=document.getElementById('tbody');
 tbody.innerHTML='';

 let balance=0;

 data.forEach(r=>{
   if(r.type==='Ingreso') balance += Number(r.amount||0);
   else balance -= Number(r.amount||0);

   const tr=document.createElement('tr');
   tr.innerHTML=`
    <td>${r.date||''}</td>
    <td>${r.type||''}</td>
    <td>${r.category||''}</td>
    <td>${r.concept||''}</td>
    <td>${r.amount||0}</td>
    <td><button onclick="removeTx('${r.id}')">Eliminar</button></td>
   `;
   tbody.appendChild(tr);
 });

 document.getElementById('balance').textContent='Balance: '+balance.toFixed(2);
}

async function removeTx(id){
 await client.from('transactions').delete().eq('id',id);
}

document.getElementById('txForm').addEventListener('submit',async(e)=>{
 e.preventDefault();

 const row={
   id: crypto.randomUUID(),
   created_at:new Date().toISOString(),
   date:document.getElementById('date').value,
   type:document.getElementById('type').value,
   category:document.getElementById('category').value,
   concept:document.getElementById('concept').value,
   amount:Number(document.getElementById('amount').value),
   payment_method:'',
   expense_type:'',
   notes:'',
   year:new Date(document.getElementById('date').value).getFullYear(),
   month:new Date(document.getElementById('date').value).getMonth()+1
 };

 const {error}=await client.from('transactions').insert(row);

 if(error){
   alert(error.message);
   return;
 }

 e.target.reset();
});

client.channel('transactions-live')
.on('postgres_changes',
{
 event:'*',
 schema:'public',
 table:'transactions'
},
()=>loadData())
.subscribe();

loadData();
</script>
</body>
</html>
